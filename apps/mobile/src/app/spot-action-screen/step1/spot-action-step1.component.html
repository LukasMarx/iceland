<lib-wizard-body>
	<h1>What do you want to do?</h1>
	<p class="wizard-subtitle">Choose how you want to plan your visit to <strong>{{ service.targetSpot()?.name }}</strong>.</p>

	<lib-option-group>
		<lib-option-group-item
			info="DIRECT ROUTE"
			title="Create a route there"
			subtitle="Builds a new day trip straight to this spot and back."
			[selected]="service.action() === 'direct-route'"
			(click)="selectAction('direct-route')"
		>
			<svg optionGroupIcon lucideArrowRight [size]="28"></svg>
		</lib-option-group-item>

		<lib-option-group-item
			info="ADD TO ROUTE"
			title="Add to an existing route"
			subtitle="Inserts this stop into one of your planned routes."
			[selected]="service.action() === 'add-to-route'"
			(click)="selectAction('add-to-route')"
		>
			<svg optionGroupIcon lucidePlus [size]="28"></svg>
		</lib-option-group-item>
	</lib-option-group>
</lib-wizard-body>

<lib-wizard-footer>
	<button libButton="primary" [disabled]="!service.action()" (click)="continue()">
		{{ continueLabel }}
	</button>
</lib-wizard-footer>
