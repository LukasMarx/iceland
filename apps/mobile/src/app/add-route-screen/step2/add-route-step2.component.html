<div class="wizard-body">
	<h1>Back to {{ service.base()?.name }}?</h1>
	<p class="wizard-subtitle">Choose how you want your trip to end — it shapes the whole route.</p>

	<lib-option-group>
		<lib-option-group-item
			info="DAY TRIP"
			[title]="'Return to ' + (service.base()?.name ?? 'your base')"
			subtitle="Loops back to your starting base. Great for single-day excursions."
			[selected]="service.tripType() === 'return'"
			(click)="selectTripType('return')"
		>
			<svg optionGroupIcon lucideRepeat2 [size]="28"></svg>
		</lib-option-group-item>

		<lib-option-group-item
			info="ROAD TRIP"
			title="End somewhere else"
			subtitle="One-way multi-day trip. You pick your overnight destination."
			[selected]="service.tripType() === 'one-way'"
			(click)="selectTripType('one-way')"
		>
			<svg optionGroupIcon lucideArrowRight [size]="28"></svg>
		</lib-option-group-item>
	</lib-option-group>
</div>

<div class="wizard-footer">
	<button libButton="primary" [disabled]="!service.tripType()" (click)="continue()">
		{{ continueLabel }}
	</button>
</div>
